# =============================================================================
# Alembic — configuración para AEROFINDER
# =============================================================================

[alembic]
# La URL se sobreescribe desde DATABASE_URL en env.py
# Formato: postgresql+asyncpg://usuario:password@host:puerto/base_de_datos
sqlalchemy.url = postgresql+asyncpg://aerofinder_app:%(POSTGRES_APP_PASSWORD)s@localhost:5432/aerofinder

script_location = database/alembic
version_locations = database/alembic/versions
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Formato de timestamp para nombres de archivo de migración
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
