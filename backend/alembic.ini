# =============================================================================
# AEROFINDER — Configuración de Alembic
# La URL de la base de datos se inyecta desde env.py (no se hardcodea aquí)
# =============================================================================

[alembic]
script_location = migrations
prepend_sys_path = .

# Formato del nombre de los archivos de revisión
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Zona horaria para los timestamps de los archivos de migración
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
