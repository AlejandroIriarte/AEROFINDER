# =============================================================================
# AEROFINDER — Configuración de MediaMTX v1.17.x
# Formato plano (flat) requerido por v1.x — sin sub-objetos de protocolo
#
# Flujo de video:
#   App Android DJI  →  RTMP (puerto 1935)  →  MediaMTX
#   MediaMTX         →  HLS  (puerto 8888)  →  Frontend Next.js (hls.js)
#   MediaMTX         →  RTSP (puerto 8554)  →  AI Worker (OpenCV)
# =============================================================================

logLevel: info
logDestinations: [stdout]

# ── API REST de administración ────────────────────────────────────────────────
api: true
apiAddress: :9997

# ── Métricas: deshabilitadas ──────────────────────────────────────────────────
metrics: false

# ── RTSP ─────────────────────────────────────────────────────────────────────
rtsp: true
rtspAddress: :8554
rtspEncryption: "no"

# ── RTMP: los drones DJI transmiten aquí ─────────────────────────────────────
rtmp: true
rtmpAddress: :1935
rtmpEncryption: "no"

# ── HLS: el frontend reproduce video con hls.js ───────────────────────────────
hls: true
hlsAddress: :8888
hlsAlwaysRemux: true
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsAllowOrigins: ['*']
hlsDirectory: ''

# ── WebRTC: deshabilitado ─────────────────────────────────────────────────────
webrtc: false

# ── SRT: deshabilitado ────────────────────────────────────────────────────────
srt: false

# ── Configuración por defecto de todos los paths ──────────────────────────────
pathDefaults:
  # Hooks al backend (best-effort, pueden fallar si el backend aún no está listo)
  runOnReady: >-
    curl -sf -X POST http://backend:8000/internal/stream/started
    -H "Content-Type: application/json"
    -d "{\"path\":\"$$MTX_PATH\"}" || true

  runOnNotReady: >-
    curl -sf -X POST http://backend:8000/internal/stream/ended
    -H "Content-Type: application/json"
    -d "{\"path\":\"$$MTX_PATH\"}" || true
